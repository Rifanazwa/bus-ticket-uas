name: Deploy via FTP/SFTP

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Build and Upload via FTP/SFTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Sync files to Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          state-name: .ftp-deploy-sync-state-v2.json
          exclude: |
            **/.git*
            **/.git*/**
            **/.github*
            **/.github*/**
            **/node_modules/**
            **/tests/**
            **/phpunit.xml.dist
            **/db_bus_ticket.sql
            **/vendor.zip
            **/scratch_*.php
            **/test_e2e_ticket.pdf
            **/writable/session/**
            **/writable/cache/**
            **/writable/debugbar/**
            **/writable/logs/**
            **/vendor/**
            **/system/**

      - name: Run Pending Migrations
        run: |
          echo "Running pending database migrations..."
          RESPONSE=$(curl -L -sS -w "%{http_code}" -o response.html --max-time 120 "https://uas.mondigi.biz.id/?db_op=migrate&token=JossBusMigrateSecureToken_2026_xYz&action=migrate")
          echo "HTTP Response code: $RESPONSE"
          echo "Migration step completed (non-blocking)."
