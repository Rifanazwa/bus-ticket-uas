name: Deploy via FTP/SFTP

on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
  # Uncomment the lines below to trigger automatically on push to the main branch
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Build and Upload via FTP/SFTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2' # Change to match your server's PHP version (e.g. 8.1, 8.2, etc.)
          extensions: json, mbstring, xml, openssl, curl, zip, intl
          coverage: none

      - name: Install dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction

      - name: Zip vendor folder
        run: zip -r vendor.zip vendor/

      - name: Sync files to Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21 # Change to 22 if using SFTP protocol
          protocol: ftp # Change to 'sftp' if using SFTP (highly recommended for security)
          local-dir: ./
          server-dir: ${{ secrets.FTP_SERVER_DIR }} # e.g. /public_html/ or /path/to/app/
          exclude: |
            **/.git*
            **/.git*/**
            **/.github*
            **/.github*/**
            **/node_modules/**
            **/tests/**
            **/phpunit.xml.dist
            **/db_bus_ticket.sql
            **/scratch_*.php
            **/test_e2e_ticket.pdf
            **/writable/session/**
            **/writable/cache/**
            **/writable/debugbar/**
            **/writable/logs/**
            **/vendor/**

      - name: Unzip Vendor on Server
        run: |
          echo "Triggering vendor extraction..."
          RESPONSE=$(curl -L -sS -w "%{http_code}" -o unzip_response.html "https://uas.mondigi.biz.id/unzip.php?token=JossBusMigrateSecureToken_2026_xYz")
          echo "Unzip Response code: $RESPONSE"
          cat unzip_response.html
          if [ "$RESPONSE" -eq 404 ]; then
            echo "Trying fallback unzip URL with /public/ prefix..."
            RESPONSE_FB=$(curl -L -sS -w "%{http_code}" -o unzip_fb.html "https://uas.mondigi.biz.id/public/unzip.php?token=JossBusMigrateSecureToken_2026_xYz")
            echo "Fallback Unzip Response code: $RESPONSE_FB"
            cat unzip_fb.html
            if [ "$RESPONSE_FB" -ne 200 ]; then
              echo "Vendor unzipping failed!"
              exit 1
            fi
          elif [ "$RESPONSE" -ne 200 ]; then
            echo "Vendor unzipping failed!"
            exit 1
          fi

      - name: Trigger Remote Database Migration
        run: |
          echo "Triggering migration on main URL..."
          RESPONSE=$(curl -L -sS -w "%{http_code}" -o response.html "https://uas.mondigi.biz.id/migrate-db?token=JossBusMigrateSecureToken_2026_xYz&action=migrate")
          echo "HTTP Response code: $RESPONSE"
          cat response.html
          if [ "$RESPONSE" -eq 404 ]; then
            echo "Main URL returned 404, trying fallback URL with /public/ prefix..."
            RESPONSE_FB=$(curl -L -sS -w "%{http_code}" -o response_fb.html "https://uas.mondigi.biz.id/public/migrate-db?token=JossBusMigrateSecureToken_2026_xYz&action=migrate")
            echo "Fallback HTTP Response code: $RESPONSE_FB"
            cat response_fb.html
            if [ "$RESPONSE_FB" -ne 200 ]; then
              echo "Database migration failed!"
              exit 1
            fi
          elif [ "$RESPONSE" -ne 200 ]; then
            echo "Database migration failed!"
            exit 1
          fi


