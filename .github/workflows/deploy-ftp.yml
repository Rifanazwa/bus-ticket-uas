name: Deploy via FTP/SFTP

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Build and Upload via FTP/SFTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Sync files to Server
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftp
          local-dir: ./
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          state-name: .ftp-deploy-sync-state-v2.json
          exclude: |
            **/.git*
            **/.git*/**
            **/.github*
            **/.github*/**
            **/node_modules/**
            **/tests/**
            **/phpunit.xml.dist
            **/db_bus_ticket.sql
            **/vendor.zip
            **/scratch_*.php
            **/test_e2e_ticket.pdf
            **/writable/session/**
            **/writable/cache/**
            **/writable/debugbar/**
            **/writable/logs/**
            **/vendor/**
            **/system/**

      - name: Trigger Database Reset
        run: |
          echo "Waiting 5 seconds for server to pick up new files..."
          sleep 5

          echo "Trying db_setup.php (standalone, bypasses CI4 routing)..."
          RESPONSE=$(curl -L -sS -w "%{http_code}" -o response.html --max-time 120 "https://uas.mondigi.biz.id/db_setup.php?token=JossBusMigrateSecureToken_2026_xYz&action=reset")
          echo "HTTP Response code: $RESPONSE"
          cat response.html
          if [ "$RESPONSE" -eq 200 ]; then
            echo "Database reset successful via db_setup.php!"
            exit 0
          fi

          echo ""
          echo "db_setup.php failed (HTTP $RESPONSE), trying landing page query param..."
          RESPONSE2=$(curl -L -sS -w "%{http_code}" -o response2.html --max-time 120 "https://uas.mondigi.biz.id/?db_op=migrate&token=JossBusMigrateSecureToken_2026_xYz&action=reset")
          echo "HTTP Response code: $RESPONSE2"
          cat response2.html
          if [ "$RESPONSE2" -eq 200 ]; then
            echo "Database operation completed via landing page."
            exit 0
          fi

          echo ""
          echo "Both methods failed. Trying /migrate-db route..."
          RESPONSE3=$(curl -L -sS -w "%{http_code}" -o response3.html --max-time 120 "https://uas.mondigi.biz.id/migrate-db?token=JossBusMigrateSecureToken_2026_xYz&action=reset")
          echo "HTTP Response code: $RESPONSE3"
          cat response3.html
          echo "Migration step completed with HTTP $RESPONSE3 (non-blocking)."
